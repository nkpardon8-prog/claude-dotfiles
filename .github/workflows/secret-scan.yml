name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run native scanner on changed files
        run: |
          chmod +x scripts/secret-scan.sh
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" \
              | while read -r f; do [ -f "$f" ] && bash scripts/secret-scan.sh "$f" || exit 2; done
          else
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
              git diff-tree --no-commit-id --name-only -r HEAD \
                | while read -r f; do [ -f "$f" ] && bash scripts/secret-scan.sh "$f" || exit 2; done
            else
              git diff --name-only "$BEFORE" "${{ github.sha }}" \
                | while read -r f; do [ -f "$f" ] && bash scripts/secret-scan.sh "$f" || exit 2; done
            fi
          fi

      - name: Run gitleaks (battle-tested second opinion)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false
